<!DOCTYPE html>
<html>
<head>
    <title>AI Recommendation System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 80%;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        ul {
            text-align: left;
            margin-top: 20px;
        }

        li {
            margin: 5px 0;
        }

        .error {
            color: red;
            margin-top: 15px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>🎬 AI Movie Recommendation System</h2>

        <p>Enter a User ID to get personalized movie recommendations</p>

        <form action="/recommend" method="post">
            <input type="text" name="user_id" placeholder="Enter User ID" required>
            <br>
            <button type="submit">Get Recommendations</button>
        </form>

        <!-- Error Message -->
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <!-- Recommendations -->
        {% if recommendations %}
            <h3>Recommended Movies:</h3>
            <ul>
                {% for movie in recommendations %}
                    <li>🎬 {{ movie }}</li>
                {% endfor %}
            </ul>
        {% endif %}

    </div>

</body>
</html>
